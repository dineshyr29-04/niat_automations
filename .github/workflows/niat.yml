name: NIAT Insider Automation

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch: # Manual trigger option
  push:
    branches: [main]

jobs:
  submit-article:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright groq
          playwright install firefox
          playwright install-deps firefox

      - name: Create Firefox profile directory
        run: |
          mkdir -p /tmp/firefox_profile

      - name: Run NIAT automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          LOGIN_PHONE: ${{ secrets.LOGIN_PHONE }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: |
          python niatinsider_automation.py
        timeout-minutes: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs
          path: ~/niat_automation_logs/
          retention-days: 7
